#---------------------------
# Fluid 主题配置文件
# Fluid Theme Configuration
#---------------------------

#---------------------------
# 页脚配置
# Footer Configuration
#---------------------------
footer:
  # 页脚第一行文字的 HTML
  # HTML of the first line of the footer
  content: '
    <div class="footer-brand">
      <span>© 2025 <strong>Gens Studio</strong></span>
      <span class="footer-separator">|</span>
      <span>专注技术分享与工具推荐</span>
    </div>
  '

  # 展示网站的 PV、UV 统计数
  # Display website PV and UV statistics
  statistics:
    enable: false
    source: "busuanzi"

  # 备案信息
  # For Chinese mainland website policy
  beian:
    enable: false

#---------------------------
# 文章页配置
# Post Page Configuration
#---------------------------
post:
  # 版权声明，会显示在每篇文章的结尾
  # Copyright, will be displayed at the end of each post
  copyright:
    enable: true

    # CreativeCommons license
    license: 'BY-NC-SA'

    # 显示作者
    author:
      enable: true

    # 显示发布日期
    post_date:
      enable: true
      format: "YYYY年MM月DD日"

    # 显示更新日期
    update_date:
      enable: true
      format: "YYYY年MM月DD日"

  # 评论配置
  comments:
    enable: true
    type: utterances

#---------------------------
# Utterances 评论配置
# Utterances Comments Configuration
#---------------------------
utterances:
  repo: gameloft333/hexo_blog_250726
  issue_term: title
  label: utterances
  theme: github-light
  theme_dark: github-dark
  crossorigin: anonymous

#---------------------------
# 网站图标配置
# Favicon Configuration
#---------------------------
favicon: /img/favicon.png
apple_touch_icon: /img/apple-touch-icon.png

#---------------------------
# 导航栏配置
# Navigation Bar Configuration
#---------------------------
navbar:
  # 导航栏左侧的标题
  # The title on the left side of the navigation bar
  blog_title: "Gens Studio"

#---------------------------
# 首页配置
# Index Page Configuration
#---------------------------
index:
  # 首页副标题
  slogan:
    enable: true
    text: "分享实用工具，传播技术知识"

  # 自动摘要
  auto_excerpt:
    enable: true

#---------------------------
# 自定义样式和脚本
# Custom CSS and JS
#---------------------------
# 自定义 CSS
custom_css: /css/custom.css

# 自定义 JS
custom_js:

#---------------------------
# SEO 优化配置
# SEO Optimization
#---------------------------
# Open Graph
open_graph:
  enable: true
  twitter_card: summary_large_image
  twitter_id:
  twitter_site:
  google_plus:
  fb_admins:
  fb_app_id:

# 结构化数据
structured_data:
  enable: true

# 网站验证
web_analytics:
  enable: false

# 搜索引擎优化
seo:
  # 自动生成关键词
  keywords: true
  # 自动生成描述
  description: true

#---------------------------
# 关于页面配置
# About Page Configuration
#---------------------------
about:
  enable: true
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.3
  avatar: /img/avatar.png
  name: "Gens Studio"
  intro: "专注技术分享与工具推荐"
  icons:
    - { class: "iconfont icon-github-fill", link: "https://github.com/", tip: "GitHub" }
    - { class: "iconfont icon-douban-fill", link: "https://douban.com", tip: "豆瓣" }
    - { class: "iconfont icon-wechat-fill", qrcode: "/img/favicon.png" }
